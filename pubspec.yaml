name: mastermax_2030
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 0.1.0

environment:
  sdk: '>=3.0.6 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.13.0
  firebase_core_web: ^2.6.0

  # Firebase Auth & Storage
  firebase_auth: ^5.5.3
  firebase_auth_web: ^5.4.2
  firebase_storage: ^12.4.5
  firebase_storage_web: ^3.6.0

  # Firebase Database & Messaging
  cloud_firestore: ^5.6.7
  cloud_firestore_web: ^4.4.7
  firebase_messaging: ^15.2.5
  firebase_messaging_web: ^3.6.5

  # Firebase Analytics & Monitoring
  firebase_analytics: ^11.4.5
  firebase_analytics_web: ^0.5.1+5
  firebase_crashlytics: ^4.3.5
  firebase_performance: ^0.10.1+5
  firebase_remote_config: ^5.4.3
  cloud_functions: ^5.5.0

  # JavaScript Interop
  js: ^0.7.2

  # Charts & Visualization
  fl_chart: ^0.69.0
  syncfusion_flutter_datepicker: ^29.2.4

  # UI & Widgets
  cupertino_icons: 1.0.8
  google_fonts: ^6.2.1
  video_player: ^2.9.2
  chewie: ^1.10.0
  flutter_svg: ^2.0.17
  loading_indicator: 3.1.1
  cached_network_image: ^3.4.1

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.0
  geocoding: ^3.0.0
  location: ^8.0.0
  platform_detect: ^2.0.0

  # State Management
  provider: ^6.0.5

  # Media
  image_picker: ^1.0.2
  camera: ^0.11.0+2
  path_provider: ^2.1.0
  record: ^6.0.0
  flutter_image_compress: ^2.1.0
  file_picker: ^8.1.4

  # Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0-beta.4
  base32: ^2.1.3
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.20.2
  share_plus: ^11.0.0
  url_launcher: ^6.1.12
  uuid: ^4.2.1
  equatable: ^2.0.5
  logger: ^2.0.2+1
  shared_preferences: ^2.2.0
  http: ^1.3.0
  dio: ^5.4.0
  flutter_cache_manager: ^3.3.1
  path: ^1.9.1
  pdf: ^3.8.4
  excel: ^4.0.6
  device_info_plus: ^11.3.0
  connectivity_plus: ^6.1.3

  crypto: any
  package_info_plus: any

  # New dependencies
  shimmer: ^3.0.0
  like_button: ^2.0.5
  flutter_staggered_animations: ^1.1.0
  flutter_animate: ^4.5.0
  # panorama: ^0.4.1
  webview_flutter: ^4.7.0
  webview_flutter_web: ^0.2.2+4
  flutter_cube: ^0.1.1
  sensors_plus: ^6.1.1

  # Image Viewing & Gallery
  photo_view: ^0.15.0
  tusc: ^3.0.0
  cross_file: ^0.3.5+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  very_good_analysis: ^7.0.0
  image: ^4.3.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/logos/
    - assets/images/markers/
    - assets/images/cars/
    - assets/images/cars/360_views/
    - assets/images/cars/interior_views/
    - assets/images/cars/virtual_tours/
    - assets/map_styles/
    - assets/images/real_estate/
    - assets/images/real_estate/360_views/
    - assets/images/real_estate/interior_views/
    - assets/images/real_estate/virtual_tours/
    - assets/images/real_estate/listings/
    - assets/images/markers/property_marker.png
    - assets/images/markers/car_marker.png
    - assets/icons/
    - assets/videos/
    - assets/videos/cars/
    - assets/videos/real_estate/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Cairo
      fonts:
        # خط متغير واحد من Google Fonts (الملفات السابقة كانت HTML وليست TTF)
        - asset: assets/fonts/Cairo-Variable.ttf
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
