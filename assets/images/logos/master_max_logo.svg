<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4169E1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- MASTER text -->
  <text x="50" y="20"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="18"
        fill="url(#goldGrad)"
        text-anchor="middle">MASTER</text>

  <!-- House -->
  <path d="M20,30 L50,10 L80,30 L80,80 L20,80 Z" 
        fill="url(#houseGrad)"
        stroke="url(#goldGrad)"
        stroke-width="4"
        stroke-linejoin="round"/>

  <!-- Windows -->
  <rect x="30" y="40" width="12" height="12" 
        fill="white" 
        stroke="url(#goldGrad)"
        stroke-width="2"/>
  <rect x="58" y="40" width="12" height="12" 
        fill="white" 
        stroke="url(#goldGrad)"
        stroke-width="2"/>

  <!-- Door -->
  <rect x="44" y="60" width="12" height="20" 
        fill="white" 
        stroke="url(#goldGrad)"
        stroke-width="2"/>

  <!-- MAX text -->
  <text x="50" y="53"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="20"
        fill="url(#goldGrad)"
        text-anchor="middle">MAX</text>

  <!-- Detailed Car -->
  <g transform="translate(35,82)">
    <!-- Car Body -->
    <rect x="0" y="0" width="30" height="12" 
          fill="white" 
          stroke="#000000"
          stroke-width="1"/>
    <!-- Car Windows -->
    <rect x="5" y="2" width="6" height="4" 
          fill="#ADD8E6" 
          stroke="#000000"
          stroke-width="0.5"/>
    <rect x="12" y="2" width="6" height="4" 
          fill="#ADD8E6"
          stroke="#000000"
          stroke-width="0.5"/>
    <rect x="19" y="2" width="6" height="4" 
          fill="#ADD8E6"
          stroke="#000000"
          stroke-width="0.5"/>
    <!-- Wheels -->
    <circle cx="8" cy="12" r="3" fill="#333333"/>
    <circle cx="22" cy="12" r="3" fill="#333333"/>
  </g>
</svg> 